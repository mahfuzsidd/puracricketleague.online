<!DOCTYPE html>
<html>
<head>
    <title>PCL Stats 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* टेबल में नाम का स्टाइल */
        .player-link {
            color: #003366;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }
        .player-link:hover { color: #d4af37; }

        /* --- Modal (Premium Card Style) --- */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }
        .stats-card {
            background: #fff; width: 95%; max-width: 500px;
            margin: 5% auto; border-radius: 12px; overflow: hidden;
            position: relative; font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-header { background: #003366; color: white; padding: 15px; text-align: left; }
        .card-header h2 { margin: 0; font-size: 24px; text-transform: uppercase; font-family: 'Bebas Neue'; letter-spacing: 1px; }
        .card-header p { margin: 2px 0 0; color: gold; font-weight: bold; font-size: 14px; }

        .stats-body { display: flex; background: #f9f9f9; align-items: stretch; }
        .stats-list { flex: 1.2; padding: 15px; background: #004080; color: white; }
        .stat-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px;
        }
        .stat-row b { text-transform: uppercase; color: #fff; }
        .stat-row span { color: gold; font-weight: bold; }

        /* प्लेयर इमेज - कटेगी नहीं */
        .player-side {
            flex: 1; background: #fff; display: flex;
            align-items: center; justify-content: center; padding: 10px;
        }
        .player-side img {
            max-width: 100%; max-height: 100%; width: auto; height: auto;
            object-fit: contain; display: block;
        }

        .close-btn {
            position: absolute; top: 5px; right: 15px;
            color: white; font-size: 35px; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://i.postimg.cc/wT4XCqmr/file-0000000092a8720882e7059a82d5a28f.png" height="50">
        <span>PCL</span>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="matches.html">Matches</a>
        <a href="teams.html">Teams</a>
        <a href="points.html">Points Table</a>
        <a href="stats.html">Stats</a>
        <a href="gallery.html">Images</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="section">
    <h2>Batting Stats</h2>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Player</th><th>Mat</th><th>Inns</th><th>NO</th><th>Runs</th><th>HS</th><th>Avg</th><th>BF</th><th>SR</th><th>100s</th><th>50s</th><th>0s</th><th>4s</th><th>6s</th>
                </tr>
            </thead>
            <tbody id="battingTable"></tbody>
        </table>
    </div>

    <h2>Bowling Stats</h2>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Player</th><th>Mat</th><th>Inns</th><th>Overs</th><th>Mdns</th><th>Runs</th><th>Wkts</th><th>Econ</th><th>5w</th><th>10w</th>
                </tr>
            </thead>
            <tbody id="bowlingTable"></tbody>
        </table>
    </div>
</div>

<div id="statsModal" class="modal" onclick="closeStats()">
    <div class="stats-card" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeStats()">&times;</span>
        <div class="card-header">
            <h2 id="mName">PLAYER NAME</h2>
            <p id="mRole">ROLE</p>
        </div>
        <div class="stats-body">
            <div class="stats-list" id="mStats">
                </div>
            <div class="player-side">
                <img id="mImg" src="" alt="Player">
            </div>
        </div>
    </div>
</div>

<script>
const sheetID = "1tUGjc1s7Qo8Zvn7jmn3PhUKmUk2hs7yF3OpZXXqiJSU";
let masterBatting = [];
let masterBowling = [];
let masterTeams = [];

// तीनों डेटा एक साथ लोड करना जरूरी है ताकि इमेज मिल सके
Promise.all([
    fetch(`https://opensheet.elk.sh/${sheetID}/Batting`).then(res => res.json()),
    fetch(`https://opensheet.elk.sh/${sheetID}/Bowling`).then(res => res.json()),
    fetch(`https://opensheet.elk.sh/${sheetID}/Teams`).then(res => res.json())
]).then(([battingData, bowlingData, teamsData]) => {
    masterBatting = battingData;
    masterBowling = bowlingData;
    masterTeams = teamsData;

    // रेंडर बैटिंग टेबल
    let batOutput = "";
    battingData.forEach(p => {
        batOutput += `
        <tr>
            <td class="player-link" onclick="openPCLCard('${p.Player}')">${p.Player}</td>
            <td>${p.Mat}</td><td>${p.Inns}</td><td>${p.NO}</td><td>${p.Runs}</td><td>${p.HS}</td>
            <td>${p.Avg}</td><td>${p.BF}</td><td>${p.SR}</td><td>${p["100s"]}</td><td>${p["50s"]}</td>
            <td>${p["0s"]}</td><td>${p["4s"]}</td><td>${p["6s"]}</td>
        </tr>`;
    });
    document.getElementById("battingTable").innerHTML = batOutput;

    // रेंडर बॉलिंग टेबल
    let bowlOutput = "";
    bowlingData.forEach(p => {
        bowlOutput += `
        <tr>
            <td class="player-link" onclick="openPCLCard('${p.Player}')">${p.Player}</td>
            <td>${p.Mat}</td><td>${p.Inns}</td><td>${p.Overs}</td><td>${p.Mdns}</td>
            <td>${p.Runs}</td><td>${p.Wkts}</td><td>${p.Econ}</td><td>${p["5w"]}</td><td>${p["10w"]}</td>
        </tr>`;
    });
    document.getElementById("bowlingTable").innerHTML = bowlOutput;
});

function openPCLCard(playerName) {
    // डेटा खोजें
    const bat = masterBatting.find(p => p.Player === playerName) || {};
    const bowl = masterBowling.find(p => p.Player === playerName) || {};
    const team = masterTeams.find(p => p.Player === playerName || p.PLAYER === playerName) || {};

    // नाम और रोल सेट करें
    document.getElementById("mName").innerText = playerName;
    document.getElementById("mRole").innerText = team.Role || team.ROLE || "PCL Player";
    document.getElementById("mImg").src = team.Image || team.IMAGE || 'https://via.placeholder.com/300?text=No+Photo';

    // कार्ड के स्टेट्स तैयार करें (IPL Style)
    let statsHtml = `
        <div class="stat-row"><b>Matches</b> <span>${bat.Mat || bowl.Mat || 0}</span></div>
        <div class="stat-row"><b>Runs</b> <span>${bat.Runs || 0}</span></div>
        <div class="stat-row"><b>Avg</b> <span>${bat.Avg || 0}</span></div>
        <div class="stat-row"><b>S/R</b> <span>${bat.SR || 0}</span></div>
        <div class="stat-row"><b>HS</b> <span>${bat.HS || 0}</span></div>
        <div class="stat-row"><b>Wickets</b> <span>${bowl.Wkts || 0}</span></div>
        <div class="stat-row"><b>Econ</b> <span>${bowl.Econ || 0}</span></div>
    `;

    document.getElementById("mStats").innerHTML = statsHtml;
    document.getElementById("statsModal").style.display = "block";
}

function closeStats() {
    document.getElementById("statsModal").style.display = "none";
}
</script>

</body>
</html>
