<!DOCTYPE html>
<html>
<head>
<title>PCL Home</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<div class="section">

<h2>Batting Stats</h2>

<table>
<thead>
<tr>
<th>Player</th>
<th>Mat</th>
<th>Inns</th>
<th>NO</th>
<th>Runs</th>
<th>HS</th>
<th>Avg</th>
<th>BF</th>
<th>SR</th>
<th>100s</th>
<th>50s</th>
<th>0s</th>
<th>4s</th>
<th>6s</th>
</tr>
</thead>

<tbody id="battingTable"></tbody>
</table>

<h2>Bowling Stats</h2>

<table>
<thead>
<tr>
<th>Player</th>
<th>Mat</th>
<th>Inns</th>
<th>Overs</th>
<th>Mdns</th>
<th>Runs</th>
<th>Wkts</th>
<th>Econ</th>
<th>5w</th>
<th>10w</th>
</tr>
</thead>

<tbody id="bowlingTable"></tbody>
</table>

</div>

<script>

// 🔥 BATTING
fetch("https://opensheet.elk.sh/1tUGjc1s7Qo8Zvn7jmn3PhUKmUk2hs7yF3OpZXXqiJSU/Batting").then(res => res.json())
.then(data => {

let output = "";

data.forEach(p => {
output += `
<tr>
<td>${p.Player}</td>
<td>${p.Mat}</td>
<td>${p.Inns}</td>
<td>${p.NO}</td>
<td>${p.Runs}</td>
<td>${p.HS}</td>
<td>${p.Avg}</td>
<td>${p.BF}</td>
<td>${p.SR}</td>
<td>${p["100s"]}</td>
<td>${p["50s"]}</td>
<td>${p["0s"]}</td>
<td>${p["4s"]}</td>
<td>${p["6s"]}</td>
</tr>
`;
});

document.getElementById("battingTable").innerHTML = output;

});


// 🎯 BOWLING
fetch("https://opensheet.elk.sh/1tUGjc1s7Qo8Zvn7jmn3PhUKmUk2hs7yF3OpZXXqiJSU/Bowling").then(res => res.json())
.then(data => {

let output = "";

data.forEach(p => {
output += `
<tr>
<td>${p.Player}</td>
<td>${p.Mat}</td>
<td>${p.Inns}</td>
<td>${p.Overs}</td>
<td>${p.Mdns}</td>
<td>${p.Runs}</td>
<td>${p.Wkts}</td>
<td>${p.Econ}</td>
<td>${p["5w"]}</td>
<td>${p["10w"]}</td>
</tr>
`;
});

document.getElementById("bowlingTable").innerHTML = output;

});

</script>

</body>
</html>
