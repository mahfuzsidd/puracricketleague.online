<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PCL - Points Table</title>
    <style>
        /* Pehle wala CSS yahan copy karein (Navbar aur Header ke liye) */
        
        .table-container {
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #001f3f;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover { background-color: #f1f1f1; }

        .points-bold { font-weight: bold; color: #001f3f; }
    </style>
</head>
<body>
    <div class="table-container">
        <h2>PCL 2026 Points Table</h2>
        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th>TEAM</th>
                    <th>P</th>
                    <th>W</th>
                    <th>L</th>
                    <th>NRR</th>
                    <th>PTS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Pura Warriors</td>
                    <td>5</td>
                    <td>4</td>
                    <td>1</td>
                    <td>+1.250</td>
                    <td class="points-bold">8</td>
                </tr>
                </tbody>
        </table>
    </div>
</body>
</html>
