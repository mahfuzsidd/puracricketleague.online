<script>
    // 1. MASTER DATABASE: Sare players ka data yahan add karein
    const profiles = {
        "mahfuz siddqui": {
            name: "Mahfuz Siddqui",
            team: "ADNAN XI",
            role: "All Rounder",
            stats: { mat: 3, runs: 178, hs: 94, sr: 202.27, sixes: 18, wkts: 2 }
        },
        "farid mahmood": {
            name: "Farid Mahmood",
            team: "ADNAN XI",
            role: "Lead Bowler",
            stats: { mat: 3, runs: 8, wkts: 6, econ: 14.43, best: "2/15", sr: 7.0 }
        },
        "adnan": {
            name: "Adnan (Captain)",
            team: "ADNAN XI",
            role: "Captain / Batsman",
            stats: { mat: 3, runs: 30, hs: 23, sr: 176.47, sixes: 1, wkts: 0 }
        }
    };

    // 2. GLOBAL CLICK LISTENER: Ye function poori website pe nazar rakhega
    document.addEventListener('click', function (e) {
        // Hum check kar rahe hain ki kya click hone wali cheez me "player-link" class hai
        // Ya fir kya usme likha hua text hamari profile database se match karta hai
        if (e.target.classList.contains('player-link') || isPlayerName(e.target.innerText)) {
            const playerName = e.target.innerText.split('(')[0].trim().toLowerCase();
            if (profiles[playerName]) {
                showProfile(playerName);
            }
        }
    });

    // Helper function to check if text is a player
    function isPlayerName(text) {
        const cleanName = text.split('(')[0].trim().toLowerCase();
        return profiles.hasOwnProperty(cleanName);
    }

    // 3. SHOW PROFILE: Popup dikhane ka logic
    function showProfile(id) {
        const p = profiles[id];
        document.getElementById('playerData').innerHTML = `
            <div class="profile-header">
                <div class="profile-img"><i class="fas fa-user-tie"></i></div>
                <div>
                    <h2 style="text-transform:uppercase;">${p.name}</h2>
                    <p style="color:#666; font-weight:bold;">${p.team} | ${p.role}</p>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-item"><span style="font-size:11px; color:#888;">MATCHES</span><span class="stat-val">${p.stats.mat}</span></div>
                <div class="stat-item"><span style="font-size:11px; color:#888;">RUNS</span><span class="stat-val">${p.stats.runs}</span></div>
                <div class="stat-item"><span style="font-size:11px; color:#888;">HIGH SCORE</span><span class="stat-val">${p.stats.hs || '0'}</span></div>
                <div class="stat-item"><span style="font-size:11px; color:#888;">WICKETS</span><span class="stat-val">${p.stats.wkts}</span></div>
                <div class="stat-item"><span style="font-size:11px; color:#888;">SIXES</span><span class="stat-val">${p.stats.sixes || '0'}</span></div>
                <div class="stat-item"><span style="font-size:11px; color:#888;">S/R</span><span class="stat-val">${p.stats.sr}</span></div>
            </div>
            <div style="margin-top:20px; padding:10px; background:#fff9e6; border-radius:5px; font-size:12px; text-align:center;">
                Official PCL Session 1 Record
            </div>
        `;
        document.getElementById('playerModal').style.display = "block";
    }

    // Match Modal Logic
    function openMatch(id) {
        document.getElementById('matchData').innerHTML = `
            <h2 style="color:var(--navy)">Match Full Scorecard</h2>
            <p style="color:#888; margin-bottom:20px;">Pura Historical Stadium, Darbhanga</p>
            
            <h3 style="background:#eee; padding:8px 10px; border-radius:5px;">ADNAN XI Innings (134/3)</h3>
            <table class="fo-table">
                <tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr>
                <tr><td class="player-link">Mahfuz Siddqui</td><td>94</td><td>42</td><td>5</td><td>12</td><td>223.8</td></tr>
                <tr><td class="player-link">Adnan</td><td>23</td><td>17</td><td>4</td><td>1</td><td>135.2</td></tr>
            </table>
            <p style="font-size:12px; margin-top:10px; color:#666;">* Click on any name above to see their career stats.</p>
        `;
        document.getElementById('matchModal').style.display = "block";
    }

    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
