<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCL Home</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header>
    <div class="logo">
<img src="https://i.postimg.cc/wT4XCqmr/file-0000000092a8720882e7059a82d5a28f.png" height="50"><span>PCL</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="matches.html">Matches</a>
        <a href="teams.html">Teams</a>
        <a href="points.html">Points Table</a>
        <a href="stats.html">Stats</a>
        <a href="gallery.html">Images</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="section">
    <h1 class="subject-bold">Welcome to PURA CRICKET LEAGUE</h1>
    <p>Official Dashboard</p>

    <div id="live-matches">
        </div>

    <div id="upcoming-matches">
        </div>

    <div id="past-matches">
        </div>
</div>

<footer>© 2026 PCL</footer>

<script>
    // 1. Apni Published Google Sheet ka CSV link yahan paste karein
    const sheetCSV = 'APKA_CSV_LINK_YAHAN'; 

    async function syncLeagueData() {
        try {
            const response = await fetch(sheetCSV);
            const data = await response.text();
            
            // CSV data ko rows mein todna (Header row ko slice karke)
            const rows = data.split('\n').slice(1);

            // Purane data ko clear karna taaki double na dikhe
            document.getElementById('live-matches').innerHTML = '';
            document.getElementById('upcoming-matches').innerHTML = '';
            document.getElementById('past-matches').innerHTML = '';

            rows.forEach(row => {
                const columns = row.split(',');
                // Column Order: Status, Date, TeamA, TeamB, Venue, Details
                const [status, date, teamA, teamB, venue, details] = columns;

                if(!teamA) return; // Khali row ko skip karein

                const matchHTML = `
                    <div class="card match-card ${status.trim().toLowerCase()}">
                        <div class="status-badge">${status}</div>
                        <h3>${teamA} VS ${teamB}</h3>
                        <p><strong>Venue:</strong> ${venue} | <strong>Date:</strong> ${date}</p>
                        <div class="score-update">${details}</div>
                    </div>
                `;

                // Status ke hisaab se box mein daalna
                if(status.trim() === 'LIVE') {
                    document.getElementById('live-matches').innerHTML += matchHTML;
                } else if(status.trim() === 'UPCOMING') {
                    document.getElementById('upcoming-matches').innerHTML += matchHTML;
                } else if(status.trim() === 'PAST') {
                    document.getElementById('past-matches').innerHTML += matchHTML;
                }
            });
        } catch (error) {
            console.error("Data fetch nahi ho raha hai:", error);
        }
    }

    // Har 30 Seconds mein update karne ka timer
    setInterval(syncLeagueData, 30000); 

    // Pehli baar load hone par run karein
    syncLeagueData();
</script>

</body>
</html>
