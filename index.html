<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCL | Team & Player Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --gold: #fbbf24;
            --gold-dim: rgba(251, 191, 36, 0.1);
            --text: #f8fafc;
            --dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 70%); background-attachment: fixed; }

        /* --- HEADER & NAV (Same as your Sketch) --- */
        header { padding: 30px 5%; text-align: center; position: relative; }
        .pcl-box { position: absolute; left: 5%; top: 35px; border: 2px solid var(--gold); padding: 5px 12px; color: var(--gold); font-family: 'Syncopate'; font-size: 18px; border-radius: 4px; }
        .main-title { font-weight: 900; letter-spacing: 4px; font-size: 32px; text-transform: uppercase; margin-bottom: 25px; }

        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-list { list-style: none; display: flex; justify-content: center; align-items: center; max-width: 1200px; margin: auto; }
        .nav-item { padding: 18px 25px; cursor: pointer; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--dim); transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--gold); }
        .circle-btn { border: 1px solid var(--gold); border-radius: 30px; margin: 10px; padding: 8px 25px; color: var(--gold); }

        .container { padding: 40px 5%; max-width: 1200px; margin: auto; display: none; animation: fadeIn 0.4s ease; }
        .container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- TEAMS GRID --- */
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .team-card { background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .team-card:hover { border-color: var(--gold); transform: translateY(-5px); background: var(--gold-dim); }
        .team-card h2 { font-size: 28px; font-weight: 900; color: var(--gold); }
        .team-card p { color: var(--dim); margin-top: 10px; font-size: 14px; }

        /* --- PLAYER LIST --- */
        .player-row { background: rgba(255,255,255,0.03); margin-bottom: 10px; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; cursor: pointer; transition: 0.2s; }
        .player-row:hover { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }
        .player-info h4 { font-size: 18px; font-weight: 700; }
        .player-info span { font-size: 12px; color: var(--dim); text-transform: uppercase; }

        /* --- STATS TABLES (Nested) --- */
        .stat-box { display: none; margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
        
        .tab-grp { display: flex; gap: 5px; margin-bottom: 15px; }
        .mini-tab { flex: 1; padding: 8px; font-size: 11px; font-weight: 800; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 4px; cursor: pointer; }
        .mini-tab.active { background: var(--gold); color: #000; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 10px; color: var(--gold); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; font-size: 13px; font-weight: 600; }

        .back-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 25px; font-weight: 700; }

    </style>
</head>
<body>

    <header>
        <div class="pcl-box">PCL</div>
        <h1 class="main-title">Pura Cricket League</h1>
    </header>

    <nav>
        <ul class="nav-list">
            <li class="nav-item" onclick="showPage('home')">Home</li>
            <li class="nav-item circle-btn" onclick="showPage('teams')">Teams</li>
            <li class="nav-item" onclick="showPage('home')">Tournament's ▼</li>
            <li class="nav-item" onclick="showPage('stats-global')">Stats</li>
        </ul>
    </nav>

    <div id="teams" class="container active">
        <h2 style="color: var(--gold); margin-bottom: 30px; text-align: center;">PCL 2024 SQUADS</h2>
        <div class="teams-grid">
            <div class="team-card" onclick="openTeam('Nehal XI')">
                <h2>NEHAL XI</h2>
                <p>Champions of PCL 2024</p>
                <div style="margin-top:20px; font-weight:800; color:var(--text)">VIEW SQUAD ➡️</div>
            </div>
            <div class="team-card" onclick="openTeam('Adnan XI')">
                <h2>ADNAN XI</h2>
                <p>Runners Up PCL 2024</p>
                <div style="margin-top:20px; font-weight:800; color:var(--text)">VIEW SQUAD ➡️</div>
            </div>
        </div>
    </div>

    <div id="player-list-section" class="container">
        <button class="back-btn" onclick="showPage('teams')">⬅ Back to Teams</button>
        <h2 id="current-team-name" style="color: var(--gold); font-size: 36px; margin-bottom: 10px;"></h2>
        <p style="color: var(--dim); margin-bottom: 30px;">Click on a player to see Batting & Bowling stats</p>
        
        <div id="players-container">
            </div>
    </div>

    <script>
        const squadData = {
            "Nehal XI": [
                { name: "Mahfuz Siddiqui", role: "All-Rounder", bat: { r: 178, b: 88, f4: 9, f6: 18, sr: 202.3 }, bowl: { o: 6, w: 2, r: 45, eco: 7.5 } },
                { name: "Nehal Siddiqui", role: "Batsman", bat: { r: 14, b: 10, f4: 2, f6: 0, sr: 140.0 }, bowl: { o: 0, w: 0, r: 0, eco: 0 } },
                { name: "Md Hassan", role: "Bowler", bat: { r: 80, b: 41, f4: 2, f6: 10, sr: 195.1 }, bowl: { o: 12, w: 7, r: 85, eco: 7.08 } },
                { name: "Afzal Sajjad", role: "Batsman", bat: { r: 44, b: 37, f4: 4, f6: 1, sr: 118.9 }, bowl: { o: 11, w: 4, r: 78, eco: 7.09 } }
            ],
            "Adnan XI": [
                { name: "Adnan", role: "All-Rounder", bat: { r: 30, b: 17, f4: 2, f6: 1, sr: 176.5 }, bowl: { o: 10, w: 5, r: 92, eco: 9.2 } },
                { name: "Shanu Sidd", role: "Batsman", bat: { r: 84, b: 38, f4: 5, f6: 9, sr: 221.1 }, bowl: { o: 0, w: 0, r: 0, eco: 0 } },
                { name: "Wasim", role: "Bowler", bat: { r: 41, b: 25, f4: 2, f6: 1, sr: 164.0 }, bowl: { o: 8, w: 3, r: 70, eco: 8.75 } }
            ]
        };

        function showPage(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openTeam(teamName) {
            const container = document.getElementById('players-container');
            document.getElementById('current-team-name').innerText = teamName;
            
            const players = squadData[teamName];
            container.innerHTML = players.map((p, index) => `
                <div class="player-wrapper">
                    <div class="player-row" onclick="toggleStats(${index})">
                        <div class="player-info">
                            <h4>${p.name}</h4>
                            <span>${p.role}</span>
                        </div>
                        <div style="color: var(--gold)">▼ Details</div>
                    </div>
                    
                    <div id="stat-box-${index}" class="stat-box">
                        <div class="tab-grp">
                            <button class="mini-tab active" id="btn-bat-${index}" onclick="switchPlayerTab(${index}, 'bat')">BATTING</button>
                            <button class="mini-tab" id="btn-bowl-${index}" onclick="switchPlayerTab(${index}, 'bowl')">BOWLING</button>
                        </div>
                        
                        <div id="content-bat-${index}">
                            <table>
                                <thead><tr><th>RUNS</th><th>BALLS</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
                                <tbody><tr><td>${p.bat.r}</td><td>${p.bat.b}</td><td>${p.bat.f4}</td><td>${p.bat.f6}</td><td>${p.bat.sr}</td></tr></tbody>
                            </table>
                        </div>
                        
                        <div id="content-bowl-${index}" style="display:none">
                            <table>
                                <thead><tr><th>OVERS</th><th>WKTS</th><th>RUNS</th><th>ECO</th></tr></thead>
                                <tbody><tr><td>${p.bowl.o}</td><td>${p.bowl.w}</td><td>${p.bowl.r}</td><td>${p.bowl.eco}</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `).join('');
            
            showPage('player-list-section');
        }

        function toggleStats(index) {
            const box = document.getElementById(`stat-box-${index}`);
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        function switchPlayerTab(index, type) {
            event.stopPropagation(); // Prevents closing the box
            const batContent = document.getElementById(`content-bat-${index}`);
            const bowlContent = document.getElementById(`content-bowl-${index}`);
            const batBtn = document.getElementById(`btn-bat-${index}`);
            const bowlBtn = document.getElementById(`btn-bowl-${index}`);

            if(type === 'bat') {
                batContent.style.display = 'block';
                bowlContent.style.display = 'none';
                batBtn.classList.add('active');
                bowlBtn.classList.remove('active');
            } else {
                batContent.style.display = 'none';
                bowlContent.style.display = 'block';
                batBtn.classList.remove('active');
                bowlBtn.classList.add('active');
            }
        }
    </script>
</body>
</html>
