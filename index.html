<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Pura Cricket League | Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #1e293b;
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        header {
            background: var(--secondary);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        nav button {
            border: none;
            background: #f1f5f9;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: var(--secondary);
            transition: 0.2s;
            white-space: nowrap;
        }

        nav button:hover, nav button.active-btn {
            background: var(--primary);
            color: white;
        }

        section {
            display: none;
            padding: 30px 20px;
            max-width: 1200px;
            margin: auto;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .active { display: block; }

        /* Dashboard Cards */
        .hero-banner {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            height: 250px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        /* Live Scoring Style */
        .live-container {
            background: var(--secondary);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 60px;
            font-weight: 800;
            color: var(--accent);
            margin: 10px 0;
        }

        .recent-balls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            min-height: 40px;
        }

        .ball-circle {
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn-score {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-run { background: white; color: var(--secondary); }
        .btn-wicket { background: var(--danger); color: white; }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            color: #64748b;
            font-weight: 600;
            border-bottom: 2px solid #edf2f7;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #edf2f7;
        }

        tr:hover { background: #f1f5f9; cursor: pointer; }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .popup-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }

    </style>
</head>
<body>

<header>🏏 PURA CRICKET LEAGUE</header>

<nav id="navbar">
    <button onclick="tab('home', this)" class="active-btn">Overview</button>
    <button onclick="tab('live', this)">Live Score</button>
    <button onclick="tab('players', this)">Player Stats</button>
    <button onclick="tab('points', this)">Standings</button>
    <button onclick="tab('gallery', this)">Gallery</button>
    <button onclick="tab('season2026', this)">Season 2026</button>
</nav>

<section id="home" class="active">
    <div class="hero-banner">
        <h1 style="margin:0">PCL SEASON 2024</h1>
        <p>Where Legends are Born</p>
    </div>
    <div class="stats-grid">
        <div class="card">
            <h4 style="color:var(--primary); margin:0">LOCATION</h4>
            <h3>Pura Historical Stadium</h3>
        </div>
        <div class="card">
            <h4 style="color:var(--primary); margin:0">DATES</h4>
            <h3>18 Apr – 20 Apr 2024</h3>
        </div>
        <div class="card">
            <h4 style="color:var(--primary); margin:0">CHAMPIONS</h4>
            <h3>TBD (Finals Pending)</h3>
        </div>
    </div>
</section>

<section id="live">
    <div class="live-container">
        <span>MATCH IN PROGRESS</span>
        <div class="score-display" id="mainScore">0/0</div>
        <div id="oversDisplay" style="font-size: 1.2rem; color: #cbd5e1;">0.0 Overs</div>
        
        <div class="recent-balls" id="recentTimeline">
            </div>

        <div class="btn-group">
            <button class="btn-score btn-run" onclick="addRun(0)">0</button>
            <button class="btn-score btn-run" onclick="addRun(1)">1</button>
            <button class="btn-score btn-run" onclick="addRun(2)">2</button>
            <button class="btn-score btn-run" onclick="addRun(4)">4</button>
            <button class="btn-score btn-run" onclick="addRun(6)">6</button>
            <button class="btn-score btn-wicket" onclick="addWicket()">W</button>
            <button class="btn-score" style="background:#64748b; color:white;" onclick="resetScore()">Reset</button>
        </div>
    </div>
</section>

<section id="players">
    <input type="text" class="search-box" id="playerSearch" placeholder="Search player name..." onkeyup="filterPlayers()">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>PLAYER</th>
                    <th>RUNS</th>
                    <th>BALLS</th>
                    <th>STRIKE RATE</th>
                </tr>
            </thead>
            <tbody id="playerTableBody"></tbody>
        </table>
    </div>
</section>

<section id="points">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>TEAM NAME</th>
                    <th>PLAYED</th>
                    <th>WON</th>
                    <th>LOST</th>
                    <th>POINTS</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Nehal XI</td><td>3</td><td>2</td><td>1</td><td><strong style="color:var(--primary)">4</strong></td></tr>
                <tr><td>Adnan XI</td><td>3</td><td>1</td><td>2</td><td><strong style="color:var(--primary)">2</strong></td></tr>
            </tbody>
        </table>
    </div>
</section>

<section id="gallery">
    <div class="stats-grid">
        <div class="card" style="padding:10px"><img src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d" style="width:100%; border-radius:10px;"></div>
        <div class="card" style="padding:10px"><img src="https://images.unsplash.com/photo-1517649763962-0c623066013b" style="width:100%; border-radius:10px;"></div>
        <div class="card" style="padding:10px"><img src="https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff" style="width:100%; border-radius:10px;"></div>
    </div>
</section>

<div class="popup" id="playerPopup" onclick="closePopup()">
    <div class="popup-card" onclick="event.stopPropagation()">
        <div id="popupDetails"></div>
        <button onclick="closePopup()" style="margin-top:20px; width:100%; padding:10px; border:none; background:var(--secondary); color:white; border-radius:8px;">Close</button>
    </div>
</div>

<script>
    // State Management
    let score = 0, wickets = 0, balls = 0;
    let timeline = [];

    const players = [
        {name:"Mahfuz Siddqui",runs:178,balls:88,fours:9,sixes:18},
        {name:"Shanu Sidd",runs:84,balls:38,fours:5,sixes:9},
        {name:"Md Hassan",runs:80,balls:41,fours:2,sixes:10},
        {name:"Afzal Sajjad",runs:44,balls:37,fours:5,sixes:2},
        {name:"Wasim",runs:41,balls:25,fours:3,sixes:3},
        {name:"Bablu",runs:39,balls:19,fours:5,sixes:2},
        {name:"Adnan",runs:30,balls:17,fours:4,sixes:1},
        {name:"Atif Ayub",runs:25,balls:14,fours:0,sixes:3}
    ];

    // Navigation
    function tab(sectionId, btn) {
        document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll("nav button").forEach(b => b.classList.remove("active-btn"));
        
        document.getElementById(sectionId).classList.add("active");
        btn.classList.add("active-btn");
    }

    // Live Scoring Logic
    function addRun(r) {
        score += r;
        balls++;
        updateTimeline(r);
        refreshDisplay();
    }

    function addWicket() {
        if(wickets < 10) {
            wickets++;
            balls++;
            updateTimeline('W');
            refreshDisplay();
        }
    }

    function updateTimeline(val) {
        timeline.push(val);
        if(timeline.length > 6) timeline.shift();
        
        let html = timeline.map(b => `<div class="ball-circle" style="background:${b==='W'?'#ef4444':'#4f46e5'}">${b}</div>`).join("");
        document.getElementById("recentTimeline").innerHTML = html;
    }

    function refreshDisplay() {
        let overs = Math.floor(balls/6) + "." + (balls%6);
        document.getElementById("mainScore").innerHTML = `${score}/${wickets}`;
        document.getElementById("oversDisplay").innerHTML = `${overs} Overs`;
    }

    function resetScore() {
        score = 0; wickets = 0; balls = 0; timeline = [];
        document.getElementById("recentTimeline").innerHTML = "";
        refreshDisplay();
    }

    // Player Stats Logic
    function loadPlayers(data = players) {
        let html = "";
        data.forEach(p => {
            let sr = ((p.runs/p.balls)*100).toFixed(1);
            html += `<tr onclick="showPlayer('${p.name}',${p.runs},${p.balls},${p.fours},${p.sixes},${sr})">
                <td><strong>${p.name}</strong></td>
                <td>${p.runs}</td>
                <td>${p.balls}</td>
                <td style="color:var(--primary); font-weight:bold;">${sr}</td>
            </tr>`;
        });
        document.getElementById("playerTableBody").innerHTML = html;
    }

    function filterPlayers() {
        let val = document.getElementById("playerSearch").value.toLowerCase();
        let filtered = players.filter(p => p.name.toLowerCase().includes(val));
        loadPlayers(filtered);
    }

    function showPlayer(n,r,b,f,s,sr) {
        document.getElementById("playerPopup").style.display = "flex";
        document.getElementById("popupDetails").innerHTML = `
            <h2 style="margin-top:0; color:var(--primary)">${n}</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; font-size:1.1rem">
                <div>Runs: <strong>${r}</strong></div>
                <div>Balls: <strong>${b}</strong></div>
                <div>4s: <strong>${f}</strong></div>
                <div>6s: <strong>${s}</strong></div>
                <div style="grid-column: span 2; border-top:1px solid #eee; padding-top:10px">Strike Rate: <strong style="color:var(--accent)">${sr}</strong></div>
            </div>
        `;
    }

    function closePopup() { document.getElementById("playerPopup").style.display = "none"; }

    window.onload = () => loadPlayers();
</script>

</body>
</html>
