<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCL | Pura Cricket League Official</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --dark-green: #00231d;
            --gold: #d4af37;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--dark-green);
            background-image: radial-gradient(circle at center, #003d32 0%, #00231d 100%);
            color: var(--white);
            min-height: 100vh;
        }

        /* Top Header Navigation */
        header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5%;
            max-width: 1400px;
            margin: auto;
        }

        /* Top Left Logo */
        .pcl-logo {
            font-family: 'Oswald', sans-serif;
            font-size: 26px;
            color: var(--dark-green);
            background: var(--gold-gradient);
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .nav-links { display: flex; list-style: none; gap: 20px; }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--gold); }

        /* Dropdown Setup */
        .dropdown { position: relative; cursor: pointer; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #00352e;
            min-width: 160px;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .dropdown-menu a { display: block; padding: 12px; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .dropdown:hover .dropdown-menu { display: block; }

        /* Main Display Area */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .dynamic-view {
            max-width: 1100px;
            margin: 20px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            text-align: center;
        }

        /* Footer & Contact Section */
        footer {
            background: #000;
            padding: 50px 20px;
            text-align: center;
            border-top: 3px solid var(--gold);
            margin-top: 50px;
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 25px 0;
        }

        .social-container a {
            font-size: 32px;
            color: var(--white);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-container a:hover { color: var(--gold); transform: scale(1.3); }

        .copyright-text { font-size: 14px; opacity: 0.7; border-top: 1px solid #333; padding-top: 20px; margin-top: 20px; }
        .gold-span { color: var(--gold); font-weight: bold; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* Add toggle for real mobile menu */
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="#" class="pcl-logo">PCL</a>

            <ul class="nav-links">
                <li><a href="#" onclick="location.reload()">HOME</a></li>
                <li class="dropdown">
                    <a>TOURNAMENTS <i class="fas fa-caret-down"></i></a>
                    <div class="dropdown-menu">
                        <a href="#" onclick="loadData('2024')">2024 Edition</a>
                        <a href="#" onclick="loadData('2026')">2026 Edition</a>
                    </div>
                </li>
                <li><a href="#">TEAMS</a></li>
                <li><a href="#">MATCHES</a></li>
                <li><a href="#">STATS</a></li>
                <li><a href="#">GALLERY</a></li>
                <li><a href="#footer-contact">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 id="main-title">PURA CRICKET LEAGUE</h1>
            <h2 id="sub-title" style="color:var(--gold); margin-top:10px;">WELCOME TO PCL</h2>
        </section>

        <div id="data-container" class="dynamic-view" style="display:none;"></div>
    </main>

    <footer id="footer-contact">
        <h2 class="gold-span">PURA CRICKET LEAGUE</h2>
        <p>Your Ultimate Sports Destination</p>
        
        <div class="social-container">
            <a href="https://instagram.com/mahfuzsidd" target="_blank" title="Follow on Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://wa.me/919507352847" target="_blank" title="Chat on WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:mahfuzsiddique4way@gmail.com" title="Send Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

        <div class="copyright-text">
            &copy; 2026 <span class="gold-span">Pura Cricket League</span>. All Rights Reserved. <br>
            Managed by Mahfuz Siddiqui
        </div>
    </footer>

    <script>
        function loadData(year) {
            const container = document.getElementById('data-container');
            const mainTitle = document.getElementById('main-title');
            
            // UI Switch
            container.style.display = 'block';
            mainTitle.innerText = "PCL " + year;
            
            // Automation Logic: 
            // Ye code data/${year}/ folder se content load karne ke liye ready hai.
            container.innerHTML = `
                <div class="folder-data">
                    <h3 style="color:var(--gold)">Automation Mode: Active</h3>
                    <p style="margin:15px 0;">Currently displaying automated records for the <b>${year}</b> season.</p>
                    <p>Put your match files in <code>/data/${year}/</code> to update live stats.</p>
                </div>
            `;
            
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }
    </script>

</body>
</html>
