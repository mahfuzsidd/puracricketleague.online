<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // Apni Google Sheet ka 'Publish to Web' wala CSV link yahan dalein
    const sheetURL = "AAPKA_GOOGLE_SHEET_CSV_LINK_YAHAN_DALEIN";

    function loadData(selectedYear) {
        const container = document.getElementById('data-container');
        const mainTitle = document.getElementById('main-title');
        
        container.style.display = 'block';
        mainTitle.innerText = "PCL " + selectedYear;
        container.innerHTML = "<p>Fetching Live Data from Google Sheets...</p>";

        // PapaParse use karke Sheet load karna
        Papa.parse(sheetURL, {
            download: true,
            header: true,
            complete: function(results) {
                let data = results.data;
                // Filter data based on Year (2024 or 2026)
                let filteredData = data.filter(row => row.Year == selectedYear);
                
                displayStats(filteredData, selectedYear);
            }
        });
    }

    function displayStats(data, year) {
        const container = document.getElementById('data-container');
        if(data.length === 0) {
            container.innerHTML = `<p>No data found for ${year} yet.</p>`;
            return;
        }

        let tableHTML = `
            <h3 style="color:var(--gold); margin-bottom:15px;">Live Statistics: ${year}</h3>
            <table style="width:100%; border-collapse: collapse; color: white;">
                <tr style="background: var(--gold); color: var(--dark-green);">
                    <th>Team</th><th>Match</th><th>Score</th><th>Winner</th>
                </tr>
        `;

        data.forEach(row => {
            tableHTML += `
                <style> td, th { padding: 10px; border: 1px solid rgba(212,175,55,0.3); } </style>
                <tr>
                    <td>${row.Team}</td>
                    <td>${row.Match}</td>
                    <td>${row.Score}</td>
                    <td>${row.Winner}</td>
                </tr>
            `;
        });

        tableHTML += `</table>`;
        container.innerHTML = tableHTML;
        window.scrollTo({ top: 500, behavior: 'smooth' });
    }
</script>
