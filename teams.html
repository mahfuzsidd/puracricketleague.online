<!DOCTYPE html>
<html>
<head>
<title>PCL Home</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<div class="section">

<h2>Teams</h2>

<div id="teamsContainer"></div>

</div>

<script>

fetch("https://opensheet.elk.sh/1tUGjc1s7Qo8Zvn7jmn3PhUKmUk2hs7yF3OpZXXqiJSU/Teams")
.then(res => res.json())
.then(data => {

console.log(data);

let teams = {};

data.forEach(row => {

let team = row.Team || row.TEAM || row.team;
let player = row.Player || row.PLAYER || row.player;
let role = row.Role || row.ROLE || row.role; // 🔥 NEW
let image = row.Image || row.IMAGE || row.image;

if(!team || !player) return;

if(!teams[team]){
teams[team] = [];
}

teams[team].push({player, role}); // 🔥 UPDATED

});

let output = "";

for(let team in teams){

output += `
<div style="margin-bottom:20px;">
<h3 style="color:gold;">${team}</h3>
<ul>
`;

teams[team].forEach(p=>{

let icon = "🏏"; // default

if(p.role === "Bowler") icon = ">";
if(p.role === "Allrounder") icon = ">";
if(p.role === "Wicketkeeper") icon = ">";
if(p.role === "Captain") icon = ">";
if(p.role === "Batter") icon = ">";

output += `<li>${icon} ${p.player}</li>`; // 🔥 UPDATED

});

output += `
</ul>
</div>
`;

}

document.getElementById("teamsContainer").innerHTML = output;

})
.catch(err => {
console.log("ERROR:", err);
});

</script>

</body>
</html>
