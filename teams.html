<!DOCTYPE html>
<html>
<head>
    <title>PCL Player Stats 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* --- Premium Card Grid --- */
        .teams-wrapper {
            display: flex; flex-wrap: wrap; gap: 20px;
            padding: 20px 0; justify-content: center; background: #f4f4f4;
        }

        .player-card {
            background: #fff; border-radius: 15px; width: 170px;
            padding: 15px; text-align: center; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
            border-bottom: 4px solid #003366;
        }

        .player-card:hover { transform: translateY(-5px); border-color: gold; }

        /* छोटे कार्ड की इमेज - अब कटेगी नहीं */
        .profile-img {
            width: 90px; height: 90px; border-radius: 50%;
            object-fit: contain; /* इमेज को बिना काटे फ्रेम में फिट करेगा */
            background: #f0f0f0; border: 3px solid #003366; margin-bottom: 10px;
        }

        /* --- Modal (IPL Style Stats Card) --- */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }

        .stats-card {
            background: #fff; width: 95%; max-width: 500px;
            margin: 2% auto; border-radius: 12px; overflow: hidden;
            position: relative; font-family: 'Arial', sans-serif;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card-header { background: #003366; color: white; padding: 15px; text-align: left; }
        .card-header h2 { margin: 0; font-size: 22px; text-transform: uppercase; }
        .card-header p { margin: 5px 0 0; color: gold; font-weight: bold; }

        .stats-body { display: flex; background: #f9f9f9; align-items: stretch; }

        .stats-list { flex: 1.2; padding: 15px; background: #004080; color: white; }
        .stat-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px;
        }
        .stat-row b { text-transform: uppercase; }
        .stat-row span { color: gold; font-weight: bold; }

        /* प्लेयर इमेज साइड - जहाँ फोटो बिल्कुल नहीं कटेगी */
        .player-side {
            flex: 1; background: #fff; display: flex;
            align-items: center; justify-content: center; padding: 10px;
            min-height: 350px;
        }

        .player-side img {
            max-width: 100%; /* चौड़ाई फ्रेम से बाहर नहीं जाएगी */
            max-height: 100%; /* ऊंचाई फ्रेम से बाहर नहीं जाएगी */
            width: auto; height: auto;
            object-fit: contain; /* असली साइज और शेप बनाए रखेगा */
            display: block;
        }

        .close-btn {
            position: absolute; top: 5px; right: 15px;
            color: white; font-size: 35px; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div class="section">
    <h2 class="team-title">PCL Teams 2026</h2>
    <div id="teamsContainer">Loading Stats Boss...</div>
</div>

<div id="statsModal" class="modal" onclick="closeStats()">
    <div class="stats-card" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeStats()">&times;</span>
        <div class="card-header">
            <h2 id="mName">PLAYER NAME</h2>
            <p id="mRole">ROLE</p>
        </div>
        <div class="stats-body">
            <div class="stats-list">
                <div class="stat-row"><b>Mat</b> <span id="sMat">0</span></div>
                <div class="stat-row"><b>Inns</b> <span id="sInns">0</span></div>
                <div class="stat-row"><b>NO</b> <span id="sNO">0</span></div>
                <div class="stat-row"><b>Runs</b> <span id="sRuns">0</span></div>
                <div class="stat-row"><b>HS</b> <span id="sHS">0</span></div>
                <div class="stat-row"><b>Avg</b> <span id="sAvg">0</span></div>
                <div class="stat-row"><b>B/F</b> <span id="sBF">0</span></div>
                <div class="stat-row"><b>S/R</b> <span id="sSR">0</span></div>
                <div class="stat-row"><b>100</b> <span id="s100">0</span></div>
                <div class="stat-row"><b>50</b> <span id="s50">0</span></div>
                <div class="stat-row"><b>0s</b> <span id="s0s">0</span></div>
                <div class="stat-row"><b>4s</b> <span id="s4s">0</span></div>
                <div class="stat-row"><b>6s</b> <span id="s6s">0</span></div>
            </div>
            <div class="player-side">
                <img id="mImg" src="" alt="Player">
            </div>
        </div>
    </div>
</div>

<script>
const sheetID = "1tUGjc1s7Qo8Zvn7jmn3PhUKmUk2hs7yF3OpZXXqiJSU";
const urls = [
    `https://opensheet.elk.sh/${sheetID}/Teams`,
    `https://opensheet.elk.sh/${sheetID}/Batting`
];

Promise.all(urls.map(u => fetch(u).then(res => res.json())))
.then(([teamsData, battingData]) => {
    let teams = {};
    teamsData.forEach(row => {
        let tName = row.Team || row.TEAM;
        let pName = row.Player || row.PLAYER;
        if(!tName || !pName) return;

        let b = battingData.find(item => item.Player === pName) || {};
        if(!teams[tName]) teams[tName] = [];

        teams[tName].push({
            name: pName,
            role: row.Role || "Player",
            image: row.Image || "",
            mat: b.Mat || "0",
            inns: b.Inns || "0",
            no: b.NO || "0",
            runs: b.Runs || "0",
            hs: b.HS || "0",
            avg: b.Avg || "0",
            bf: b.BF || "0",
            sr: b.SR || "0",
            c100: b['100'] || "0",
            c50: b['50'] || "0",
            c0s: b['0s'] || "0",
            c4s: b['4s'] || "0",
            c6s: b['6s'] || "0"
        });
    });
    renderTeams(teams);
});

function renderTeams(teams) {
    let output = "";
    for(let t in teams) {
        output += `<h3 class="team-title" style="text-align:center; color:#003366; margin-top:30px;">${t}</h3><div class="teams-wrapper">`;
        teams[t].forEach(p => {
            output += `
                <div class="player-card" onclick='openModal(${JSON.stringify(p)})'>
                    <img src="${p.image || 'https://via.placeholder.com/150'}" class="profile-img">
                    <div class="player-name" style="font-weight:bold; color:#003366;">${p.name}</div>
                    <div class="player-role" style="font-size:12px; color:#666;">${p.role}</div>
                </div>
            `;
        });
        output += `</div>`;
    }
    document.getElementById("teamsContainer").innerHTML = output;
}

function openModal(p) {
    document.getElementById("mName").innerText = p.name;
    document.getElementById("mRole").innerText = p.role;
    document.getElementById("mImg").src = p.image || 'https://via.placeholder.com/300?text=No+Photo';
    
    document.getElementById("sMat").innerText = p.mat;
    document.getElementById("sInns").innerText = p.inns;
    document.getElementById("sNO").innerText = p.no;
    document.getElementById("sRuns").innerText = p.runs;
    document.getElementById("sHS").innerText = p.hs;
    document.getElementById("sAvg").innerText = p.avg;
    document.getElementById("sBF").innerText = p.bf;
    document.getElementById("sSR").innerText = p.sr;
    document.getElementById("s100").innerText = p.c100;
    document.getElementById("s50").innerText = p.c50;
    document.getElementById("s0s").innerText = p.c0s;
    document.getElementById("s4s").innerText = p.c4s;
    document.getElementById("s6s").innerText = p.c6s;

    document.getElementById("statsModal").style.display = "block";
}

function closeStats() {
    document.getElementById("statsModal").style.display = "none";
}
</script>
</body>
</html>
