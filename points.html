<!DOCTYPE html>
<html>
<head>

<title>PCL Home</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<div class="section">

<h2>Points Table</h2>

<table>
<thead>
<tr>
<th>POS</th>
<th>TEAM</th>
<th>P</th>
<th>W</th>
<th>L</th>
<th>Point</th>
<th>NRR</th>
</tr>
</thead>

<tbody id="pointsTable"></tbody>

</table>

</div>

<script>

fetch("https://opensheet.elk.sh/1tUGjc1s7Qo8Zvn7jmn3PhUKmUk2hs7yF3OpZXXqiJSU/Points")
.then(res => res.json())
.then(data => {

let output = "";

data.forEach(team => {
output += `
<tr>
<td>${team.POS}</td>
<td>${team.TEAM}</td>
<td>${team.P}</td>
<td>${team.W}</td>
<td>${team.L}</td>
<td>${team.Point}</td>
<td>${team.NRR}</td>
</tr>
`;
});

document.getElementById("pointsTable").innerHTML = output;

})
.catch(err => {
console.log("Points Error:", err);
});

</script>
